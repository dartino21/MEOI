    html, body {
      width: 100vw;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      background: #7DBB65;
    }

    .screen {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      transition: transform .35s ease;
    }

    .home {
      display: grid;
      place-items: center;
      background: #7DBB65;
      touch-action: none;
      overscroll-behavior: none;
    }

    .cat-area {
      display: grid;
      justify-items: center;
      gap: 10px;
      transform: translateY(-8px);
    }

    .cat {
      max-width: min(80vw, 360px);
      max-height: min(62vh, 380px);
      object-fit: contain;
      display: block;
    }

    .typewriter-slot {
      display: grid;
      height: 1.2em;
      place-items: center;
      color: #000;
      font: clamp(24px, 7vw, 36px)/1 "Baltica Pixel", monospace;
    }

    .typewriter {
      margin: 0;
      font: inherit;
      white-space: nowrap;
      letter-spacing: .08em;
      opacity: 0;
      transform: translateY(8px) scale(.92);
      clip-path: inset(0 50% 0 50%);
      animation: word-cycle 7s cubic-bezier(.22, 1, .36, 1) infinite;
    }

    @keyframes word-cycle {
      0%, 12% {
        opacity: 0;
        transform: translateY(8px) scale(.92);
        letter-spacing: .5em;
        clip-path: inset(0 50% 0 50%);
      }
      30%, 62% {
        opacity: 1;
        transform: translateY(0) scale(1);
        letter-spacing: .08em;
        clip-path: inset(0);
      }
      80%, 100% {
        opacity: 0;
        transform: translateY(-6px) scale(.95);
        letter-spacing: .42em;
        clip-path: inset(0 50% 0 50%);
      }
    }

    .home-indicator {
      position: absolute;
      bottom: 12px;
      left: 50%;
      width: 50px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .4);
      transform: translateX(-50%);
    }

    .diary {
      box-sizing: border-box;
      padding: 20px;
      background: #F5F5F0;
      color: #202020;
      transform: translateY(100%);
      font-family: "Baltica Pixel", monospace;
    }

    .diary-header {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .back {
      width: 40px;
      height: 40px;
      padding: 0;
      border: 0;
      background: transparent;
      color: inherit;
      font: 32px/1 "Baltica Pixel", monospace;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .cat-micro {
      width: 40px;
      height: 40px;
      object-fit: contain;
      flex: 0 0 40px;
      opacity: 0;
      transform: scale(0);
      transform-origin: center;
    }

    .diary h1 {
      margin: 0;
      font: 32px/1 "Baltica Pixel", monospace;
      white-space: nowrap;
    }

    .add-entry {
      position: absolute;
      right: 24px;
      bottom: 24px;
      width: 60px;
      height: 60px;
      padding: 0;
      border: 0;
      border-radius: 50%;
      background: #7DBB65;
      color: #000;
      font: 42px/1 "Baltica Pixel", monospace;
      cursor: pointer;
      display: grid;
      place-items: center;
    }

    .entries {
      position: absolute;
      top: 88px;
      right: 14px;
      bottom: 0;
      left: 20px;
      padding: 4px 6px 110px 0;
      overflow-y: auto;
      overscroll-behavior: contain;
    }

    .empty-entries {
      margin: 20px 0;
      color: #777;
      font-size: 18px;
    }

    .entry-item {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 80px;
      margin: 0 0 10px;
      cursor: pointer;
    }

    .entry-title {
      min-width: 0;
      font-size: clamp(22px, 6vw, 30px);
      line-height: 1;
      overflow-wrap: anywhere;
    }

    .entry-thumb {
      width: 80px;
      height: 80px;
      flex: 0 0 80px;
      object-fit: cover;
      background: #ddd;
    }

    .entry-year {
      font-size: 17px;
      white-space: nowrap;
    }

    .entry-modal {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
    }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, .25);
      opacity: 0;
      transition: opacity .25s ease;
    }

    .modal-sheet {
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      box-sizing: border-box;
      max-height: min(76vh, 620px);
      padding: 22px 20px calc(20px + env(safe-area-inset-bottom));
      overflow-y: auto;
      border-radius: 24px 24px 0 0;
      background: #fff;
      color: #202020;
      transform: translateY(105%);
      transition: transform .3s cubic-bezier(.22, 1, .36, 1);
    }

    .modal-open .entry-modal {
      pointer-events: auto;
    }

    .modal-open .modal-backdrop {
      opacity: 1;
    }

    .modal-open .modal-sheet {
      transform: translateY(0);
    }

    .modal-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 26px;
    }

    .modal-step {
      margin: 0;
      color: #777;
      font-size: 16px;
    }

    .modal-close,
    .modal-back {
      padding: 4px 0;
      border: 0;
      background: transparent;
      color: inherit;
      font: 20px/1 "Baltica Pixel", monospace;
      cursor: pointer;
    }

    .form-step[hidden] {
      display: none;
    }

    .form-step h2 {
      margin: 0 0 18px;
      font: 28px/1.1 "Baltica Pixel", monospace;
    }

    .form-step input,
    .form-step textarea {
      box-sizing: border-box;
      width: 100%;
      border: 2px solid #202020;
      border-radius: 0;
      padding: 12px;
      background: #fff;
      color: #202020;
      font: 18px/1.25 "Baltica Pixel", monospace;
    }

    .form-step textarea {
      min-height: 130px;
      resize: vertical;
    }

    .photo-picker {
      display: grid;
      place-items: center;
      min-height: 150px;
      border: 2px dashed #202020;
      cursor: pointer;
    }

    .photo-picker input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
    }

    .photo-preview {
      display: none;
      width: 150px;
      height: 150px;
      object-fit: cover;
    }

    .photo-picker.has-photo .photo-preview {
      display: block;
    }

    .photo-picker.has-photo .photo-placeholder {
      display: none;
    }

    .form-error {
      min-height: 1.2em;
      margin: 12px 0 0;
      color: #a22;
      font-size: 15px;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 28px;
    }

    .modal-actions button {
      min-height: 48px;
      border: 0;
      font: 18px/1 "Baltica Pixel", monospace;
      cursor: pointer;
    }

    .modal-actions .primary {
      background: #7DBB65;
      color: #000;
    }

    .modal-actions .secondary {
      background: #ddd;
      color: #202020;
    }

    .entry-card {
      position: absolute;
      inset: 0;
      z-index: 10;
      overflow: hidden;
      background: #F5F5F0;
      color: #1A1A1A;
      transform: translateX(100%);
      transition: transform .35s cubic-bezier(.22, 1, .36, 1);
      pointer-events: none;
    }

    .is-entry-card-open .entry-card {
      transform: translateX(0);
      pointer-events: auto;
    }

    .card-back {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 1;
      width: 44px;
      height: 44px;
      border: 0;
      background: transparent;
      color: #1A1A1A;
      cursor: pointer;
    }

    .card-back svg {
      width: 32px;
      height: 24px;
      fill: currentColor;
      shape-rendering: crispEdges;
    }

    .card-photo-action {
      display: grid;
      width: 100%;
      height: 55vh;
      height: 55dvh;
      overflow: hidden;
      background: #E9FCD9;
      cursor: pointer;
    }

    .card-photo-action input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
    }

    .card-image,
    .card-photo-placeholder {
      grid-area: 1 / 1;
      width: 100%;
      height: 100%;
    }

    .card-image {
      display: none;
      object-fit: cover;
    }

    .card-photo-placeholder {
      display: grid;
      place-items: center;
      color: #1A1A1A;
      font: 20px/1 "Baltica Pixel", monospace;
    }

    .card-photo-action.has-photo .card-image {
      display: block;
    }

    .card-photo-action.has-photo .card-photo-placeholder {
      display: none;
    }

    .card-editor {
      height: calc(45vh - 60px);
      height: calc(45dvh - 60px);
      display: grid;
      grid-template-rows: auto 1fr;
      background: #E9FCD9;
    }

    .card-title-input {
      width: 100%;
      box-sizing: border-box;
      padding: 18px 20px;
      border: 0;
      border-bottom: 1px solid #888888;
      border-radius: 0;
      background: #F5F5F0;
      color: #1A1A1A;
      font: clamp(28px, 8vw, 40px)/1.05 "Baltica Pixel", monospace;
    }

    .card-text-input {
      min-width: 0;
      min-height: 0;
      box-sizing: border-box;
      width: 100%;
      border: 0;
      border-radius: 0;
      padding: 20px 20px 86px;
      resize: none;
      overflow-y: auto;
      background: #E9FCD9;
      color: #1A1A1A;
      font: 18px/1.35 "Baltica Pixel", monospace;
    }

    .card-actions {
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 12px 20px calc(12px + env(safe-area-inset-bottom));
      background: linear-gradient(transparent, #E9FCD9 32%);
    }

    .card-actions button {
      min-height: 48px;
      border: 0;
      font: 18px/1 "Baltica Pixel", monospace;
      cursor: pointer;
    }

    .card-save {
      background: #7DBB65;
      color: #1A1A1A;
    }

    .card-delete {
      background: #ddd;
      color: #1A1A1A;
    }

    .is-diary-open .home {
      transform: translateY(-100%);
    }

    .is-diary-open .diary {
      transform: translateY(0);
    }

    .is-diary-open .cat-micro {
      animation: micro-cat-in .35s cubic-bezier(.22, 1, .36, 1) .18s both;
    }

    @keyframes micro-cat-in {
      from {
        opacity: 0;
        transform: scale(0);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>

  <section class="screen diary" aria-labelledby="diary-title">
    <header class="diary-header">
      <button class="back" type="button" aria-label="Вернуться на главный экран">←</button>
      <img class="cat-micro" alt="Анимированный чёрный кот">
      <h1 id="diary-title">Дневник</h1>
    </header>
    <div class="entries" aria-live="polite"></div>
    <button class="add-entry" type="button" aria-label="Добавить запись">+</button>
    <div class="entry-modal" aria-hidden="true">
      <div class="modal-backdrop"></div>
      <form class="modal-sheet" novalidate>
        <div class="modal-topline">
          <button class="modal-back" type="button" hidden>← Назад</button>
          <p class="modal-step">Шаг 1 из 4</p>
          <button class="modal-close" type="button" aria-label="Отменить создание записи">×</button>
        </div>
        <div class="form-step" data-step="1">
          <h2>Дата</h2>
          <input class="entry-date" type="date" required>
        </div>
        <div class="form-step" data-step="2" hidden>
          <h2>Заголовок</h2>
          <input class="entry-title-input" type="text" placeholder="Например, Ableton" required>
        </div>
        <div class="form-step" data-step="3" hidden>
          <h2>Текст записи</h2>
          <textarea class="entry-text" placeholder="Напишите здесь…" required></textarea>
        </div>
        <div class="form-step" data-step="4" hidden>
          <h2>Загрузка фото</h2>
          <label class="photo-picker">
            <input class="entry-image" type="file" accept="image/*">
            <span class="photo-placeholder">Выбрать фото</span>
            <img class="photo-preview" alt="Предпросмотр выбранного фото">
          </label>
        </div>
        <p class="form-error" aria-live="assertive"></p>
        <div class="modal-actions">
          <button class="secondary modal-cancel" type="button">Отмена</button>
          <button class="primary modal-next" type="button">Далее</button>
        </div>
      </form>
    </div>
    <section class="entry-card" aria-label="Карточка записи" aria-hidden="true">
      <button class="card-back" type="button" aria-label="Вернуться к списку">
        <svg viewBox="0 0 32 24" aria-hidden="true"><path d="M0 11h3V8h3V5h3V2h3V0h3v7h17v12H15v5h-3v-3H9v-3H6v-3H3v-1H0z"/></svg>
      </button>
      <label class="card-photo-action">
        <input class="card-image-input" type="file" accept="image/*">
        <img class="card-image" alt="Фото записи">
        <span class="card-photo-placeholder">Без фото</span>
      </label>
      <div class="card-editor">
        <input class="card-title-input" type="text" aria-label="Заголовок записи">
        <textarea class="card-text-input" aria-label="Текст записи"></textarea>
      </div>
      <div class="card-actions">
        <button class="card-delete" type="button">Удалить</button>
        <button class="card-save" type="button">Сохранить</button>
      </div>
    </section>
  </section>

  <script>
    const home = document.querySelector('.home');
    const back = document.querySelector('.back');
    const cat = document.querySelector('.cat');
    const catMicro = document.querySelector('.cat-micro');
    const entriesList = document.querySelector('.entries');
    const addEntry = document.querySelector('.add-entry');
    const entryModal = document.querySelector('.entry-modal');
    const modalBackdrop = document.querySelector('.modal-backdrop');
    const modalForm = document.querySelector('.modal-sheet');
    const modalSteps = [...document.querySelectorAll('.form-step')];
    const modalStep = document.querySelector('.modal-step');
    const modalBack = document.querySelector('.modal-back');
    const modalClose = document.querySelector('.modal-close');
    const modalCancel = document.querySelector('.modal-cancel');
    const modalNext = document.querySelector('.modal-next');
    const formError = document.querySelector('.form-error');
    const dateInput = document.querySelector('.entry-date');
    const titleInput = document.querySelector('.entry-title-input');
    const textInput = document.querySelector('.entry-text');
    const imageInput = document.querySelector('.entry-image');
    const photoPicker = document.querySelector('.photo-picker');
    const photoPreview = document.querySelector('.photo-preview');
    const entryCard = document.querySelector('.entry-card');
    const cardBack = document.querySelector('.card-back');
    const cardPhotoAction = document.querySelector('.card-photo-action');
    const cardImageInput = document.querySelector('.card-image-input');
    const cardImage = document.querySelector('.card-image');
    const cardTitleInput = document.querySelector('.card-title-input');
    const cardTextInput = document.querySelector('.card-text-input');
    const cardSave = document.querySelector('.card-save');
    const cardDelete = document.querySelector('.card-delete');
    const storageKey = 'meow-diary-entries-v1';
    let startY = null;
    let currentStep = 1;
    let imageBase64 = '';
    let cardImageBase64 = '';
    let activeEntryId = null;
    let entries = [];

    const makeDiaryCat = source => {
      const binary = atob(source.split(',')[1]);
      const bytes = Uint8Array.from(binary, char => char.charCodeAt(0));

      for (let index = 0; index < bytes.length - 2; index += 1) {
        if (bytes[index] === 125 && bytes[index + 1] === 187 && bytes[index + 2] === 101) {
          bytes[index] = 245;
          bytes[index + 1] = 245;
          bytes[index + 2] = 240;
          break;
        }
      }

      let updated = '';
      for (let index = 0; index < bytes.length; index += 0x8000) {
        updated += String.fromCharCode(...bytes.subarray(index, index + 0x8000));
      }

      return `data:image/gif;base64,${btoa(updated)}`;
    };

    catMicro.src = makeDiaryCat(cat.src);

    const todayValue = () => {
      const today = new Date();
      const month = String(today.getMonth() + 1).padStart(2, '0');
      const day = String(today.getDate()).padStart(2, '0');
      return `${today.getFullYear()}-${month}-${day}`;
    };

    const normalizeEntry = entry => ({
      id: entry.id,
      date: entry.date || todayValue(),
      title: entry.title || '',
      text: entry.text || '',
      image: entry.image || entry.imageBase64 || ''
    });

    const loadEntries = () => {
      try {
        const saved = JSON.parse(localStorage.getItem(storageKey));
        return Array.isArray(saved) ? saved.map(normalizeEntry) : [];
      } catch {
        return [];
      }
    };

    const persistEntries = () => {
      try {
        localStorage.setItem(storageKey, JSON.stringify(entries));
        return true;
      } catch {
        return false;
      }
    };

    const renderEntries = () => {
      entriesList.replaceChildren();
      const sortedEntries = [...entries].sort((first, second) => {
        return second.date.localeCompare(first.date) || second.id - first.id;
      });

      if (!sortedEntries.length) {
        const empty = document.createElement('p');
        empty.className = 'empty-entries';
        empty.textContent = 'Записей пока нет';
        entriesList.append(empty);
        return;
      }

      sortedEntries.forEach(entry => {
        const item = document.createElement('article');
        item.className = 'entry-item';
        item.tabIndex = 0;
        item.setAttribute('role', 'button');
        item.setAttribute('aria-label', `Открыть запись: ${entry.title}`);

        const title = document.createElement('div');
        title.className = 'entry-title';
        title.textContent = entry.title;
        item.append(title);

        if (entry.image) {
          const image = document.createElement('img');
          image.className = 'entry-thumb';
          image.src = entry.image;
          image.alt = '';
          item.append(image);
        }

        const year = document.createElement('time');
        year.className = 'entry-year';
        year.dateTime = entry.date;
        year.textContent = entry.date.slice(0, 4);
        item.append(year);
        item.addEventListener('click', () => openEntryCard(entry.id));
        item.addEventListener('keydown', event => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            openEntryCard(entry.id);
          }
        });
        entriesList.append(item);
      });
    };

    const showStep = step => {
      currentStep = step;
      modalSteps.forEach(item => {
        item.hidden = Number(item.dataset.step) !== currentStep;
      });
      modalStep.textContent = `Шаг ${currentStep} из 4`;
      modalBack.hidden = currentStep === 1;
      modalNext.textContent = currentStep === 4 ? 'Сохранить' : 'Далее';
      formError.textContent = '';
    };

    const resetForm = () => {
      modalForm.reset();
      dateInput.value = todayValue();
      imageBase64 = '';
      photoPreview.removeAttribute('src');
      photoPicker.classList.remove('has-photo');
      showStep(1);
    };

    const openModal = () => {
      resetForm();
      document.body.classList.add('modal-open');
      entryModal.setAttribute('aria-hidden', 'false');
    };

    const closeModal = () => {
      document.body.classList.remove('modal-open');
      entryModal.setAttribute('aria-hidden', 'true');
      formError.textContent = '';
    };

    const validCurrentStep = () => {
      if (currentStep === 1 && !dateInput.value) {
        formError.textContent = 'Выберите дату';
        return false;
      }
      if (currentStep === 2 && !titleInput.value.trim()) {
        formError.textContent = 'Введите заголовок';
        return false;
      }
      if (currentStep === 3 && !textInput.value.trim()) {
        formError.textContent = 'Введите текст записи';
        return false;
      }
      return true;
    };

    const saveEntry = () => {
      const entry = {
        id: Date.now(),
        date: dateInput.value,
        title: titleInput.value.trim(),
        text: textInput.value.trim(),
        image: imageBase64
      };

      entries = [entry, ...entries];
      if (!persistEntries()) {
        entries = entries.filter(item => item.id !== entry.id);
        formError.textContent = 'Не удалось сохранить фото: выберите файл меньшего размера';
        return;
      }

      renderEntries();
      closeModal();
    };

    const setCardImage = image => {
      cardImageBase64 = image || '';
      cardPhotoAction.classList.toggle('has-photo', Boolean(cardImageBase64));
      if (cardImageBase64) cardImage.src = cardImageBase64;
      else cardImage.removeAttribute('src');
    };

    const openEntryCard = id => {
      const entry = entries.find(item => item.id === id);
      if (!entry) return;

      activeEntryId = id;
      cardTitleInput.value = entry.title;
      cardTextInput.value = entry.text;
      cardImageInput.value = '';
      setCardImage(entry.image);
      document.body.classList.add('is-entry-card-open');
      entryCard.setAttribute('aria-hidden', 'false');
    };

    const closeEntryCard = () => {
      document.body.classList.remove('is-entry-card-open');
      entryCard.setAttribute('aria-hidden', 'true');
      activeEntryId = null;
    };

    const saveCardEntry = () => {
      const title = cardTitleInput.value.trim();
      const text = cardTextInput.value.trim();
      if (!title || !text) {
        alert('Заполните заголовок и текст записи');
        return;
      }

      const previousEntries = entries;
      entries = entries.map(entry => entry.id === activeEntryId ? {
        ...entry,
        title,
        text,
        image: cardImageBase64
      } : entry);
      if (!persistEntries()) {
        entries = previousEntries;
        alert('Не удалось сохранить фото: выберите файл меньшего размера');
        return;
      }

      renderEntries();
      closeEntryCard();
    };

    cardImageInput.addEventListener('change', () => {
      const [file] = cardImageInput.files;
      if (!file) return;

      const reader = new FileReader();
      reader.addEventListener('load', () => setCardImage(reader.result));
      reader.readAsDataURL(file);
    });

    cardBack.addEventListener('click', closeEntryCard);
    cardSave.addEventListener('click', saveCardEntry);
    cardDelete.addEventListener('click', () => {
      if (!confirm('Вы уверены, что хотите удалить эту запись?')) return;

      const previousEntries = entries;
      entries = entries.filter(entry => entry.id !== activeEntryId);
      if (!persistEntries()) {
        entries = previousEntries;
        alert('Не удалось удалить запись');
        return;
      }

      renderEntries();
      closeEntryCard();
    });

    imageInput.addEventListener('change', () => {
      const [file] = imageInput.files;
      if (!file) return;

      const reader = new FileReader();
      reader.addEventListener('load', () => {
        imageBase64 = reader.result;
        photoPreview.src = imageBase64;
        photoPicker.classList.add('has-photo');
      });
      reader.readAsDataURL(file);
    });

    addEntry.addEventListener('click', openModal);
    modalClose.addEventListener('click', closeModal);
    modalCancel.addEventListener('click', closeModal);
    modalBackdrop.addEventListener('click', closeModal);
    modalBack.addEventListener('click', () => showStep(currentStep - 1));
    modalForm.addEventListener('submit', event => event.preventDefault());
    modalNext.addEventListener('click', () => {
      if (currentStep < 4) {
        if (validCurrentStep()) showStep(currentStep + 1);
        return;
      }
      saveEntry();
    });

    entries = loadEntries();
    persistEntries();
    renderEntries();

    const openDiary = () => document.body.classList.add('is-diary-open');

    const startGesture = y => {
      startY = y;
    };

    const endGesture = y => {
      if (startY !== null && startY - y > 50) openDiary();
      startY = null;
    };

    home.addEventListener('touchstart', event => {
      startGesture(event.touches[0].clientY);
    }, { passive: true });

    home.addEventListener('touchmove', () => {}, { passive: true });

    home.addEventListener('touchend', event => {
      endGesture(event.changedTouches[0].clientY);
    }, { passive: true });

    home.addEventListener('touchcancel', () => {
      startY = null;
    }, { passive: true });

    home.addEventListener('pointerdown', event => startGesture(event.clientY));
    home.addEventListener('pointerup', event => endGesture(event.clientY));

    home.addEventListener('wheel', event => {
      if (event.deltaY > 50) openDiary();
    }, { passive: true });

    back.addEventListener('click', () => {
      document.body.classList.remove('is-diary-open');
    });
  </script>
</body>
</html>
